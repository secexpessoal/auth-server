  #   volumes:
  #     - "/var/run/docker.sock:/var/run/docker.sock:ro"

  auth-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - APP_PORT=${APP_PORT}
        - DOMAIN=${DOMAIN}
    container_name: auth-server
    environment:
      - APP_PORT=${APP_PORT}
      - DOMAIN=${DOMAIN}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - REFRESH_EXPIRATION=${REFRESH_EXPIRATION}
      - DB_URI=${DB_URI}
      - DB_NAME=${DB_NAME}
      - NAME_ADMIN=${NAME_ADMIN}
      - EMAIL_ADMIN=${EMAIL_ADMIN}
      - PASSWORD_ADMIN=${PASSWORD_ADMIN}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
    restart: always

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=${DB_NAME:-auth}
      - MONGO_INITDB_ROOT_USERNAME=${DB_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASSWORD:-admin123.}
    volumes:
      - mongodb_data:/data/db
    restart:
      always

      # ConfiguraĂ§Ă£o do Middleware de Forward Auth
      # - "traefik.http.middlewares.auth-forward.forwardauth.address=http://auth-server:${APP_PORT}/v1/auth/verify"
      # - "traefik.http.middlewares.auth-forward.forwardauth.trustForwardHeader=true"
      # - "traefik.http.middlewares.auth-forward.forwardauth.authResponseHeaders=Authorization"

volumes:
  mongodb_data:
