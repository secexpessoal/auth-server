server.port=${APP_PORT}
app.auth-url=${AUTH_URL}
spring.application.name=auth
app.base-domain=${BASE_DOMAIN}

# Jwt
security.jwt.secret-key=${JWT_SECRET}
security.jwt.refresh-expiration-time=${REFRESH_EXPIRATION}
security.jwt.expiration-time=${JWT_EXPIRATION}
security.jwt.cookie.secure=${JWT_COOKIE_SECURE}

# Security
security.rate-limit.enabled=${RATE_LIMIT_ENABLED}

# Database (MongoDB Only)
spring.data.mongodb.uri=${DB_URI}
spring.data.mongodb.database=${DB_NAME}

# MongoDB Connection Pool Tuning
spring.data.mongodb.max-connections-per-host=20
spring.data.mongodb.min-connections-per-host=5
spring.data.mongodb.connect-timeout=3000
spring.data.mongodb.max-connection-idle-time=1800000

# Admin
admin.name=${NAME_ADMIN}
admin.email=${EMAIL_ADMIN}
admin.password=${PASSWORD_ADMIN}

# Exception Handling
spring.web.resources.add-mappings=false
spring.mvc.throw-exception-if-no-handler-found=true
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never

# SpringDoc / Swagger
springdoc.show-hateoas-endpoints=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled=true

# Resend
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL}

# Logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%X{requestId}] [%X{userEmail}] [%X{clientIp}] --- [%t] %-40.40logger{39} : %m%n
