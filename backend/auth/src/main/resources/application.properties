spring.application.name=auth
server.port=${APP_PORT:8080}
# Jwt
security.jwt.secret-key=${JWT_SECRET:c2VuaGEgZXh0cmVtYW1lbnRlIHBvdGVudGUgcGFyYSBwb2RlciBjcmlwdG9ncmFmYXI=}
security.jwt.refresh-expiration-time=${REFRESH_EXPIRATION:604800000}
security.jwt.expiration-time=${JWT_EXPIRATION:900000}
# Database (MongoDB Only)
spring.data.mongodb.uri=${DB_URI:mongodb://admin:admin123.@localhost:27017/auth?authSource=admin}
spring.data.mongodb.database=${DB_NAME:auth}

# MongoDB Connection Pool Tuning (Equivalent to Hikari)
# maximum-pool-size=20
spring.data.mongodb.max-connections-per-host=20
# minimum-idle=5
spring.data.mongodb.min-connections-per-host=5
# connection-timeout=3000ms
spring.data.mongodb.connect-timeout=3000
# max-lifetime=1800000ms
spring.data.mongodb.max-connection-idle-time=1800000
# Admin
admin.name=${NAME_ADMIN:admin}
admin.email=${EMAIL_ADMIN:admin@auth.com}
admin.password=${PASSWORD_ADMIN:admin123}
# Exception Handling
spring.web.resources.add-mappings=false
spring.mvc.throw-exception-if-no-handler-found=true
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never
# SpringDoc / Swagger
security.jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
springdoc.show-hateoas-endpoints=false
# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled=true

# Resend
resend.api.key=${RESEND_API_KEY:re_123456789}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# Logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%X{requestId}] [%X{userEmail}] [%X{clientIp}] --- [%t] %-40.40logger{39} : %m%n
