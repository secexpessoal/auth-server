spring.application.name=auth
# Server
server.port=${APP_PORT:8080}
# Jwt
security.jwt.secret-key=${JWT_SECRET:c2VuaGEgZXh0cmVtYW1lbnRlIHBvdGVudGUgcGFyYSBwb2RlciBjcmlwdG9ncmFmYXI=}
security.jwt.expiration-time=${JWT_EXPIRATION:900000}
security.jwt.refresh-expiration-time=${REFRESH_EXPIRATION:604800000}
# Database
# Production Safety
# spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:secret}
spring.jpa.properties.hibernate.default_schema=${POSTGRES_SCHEMA:auth}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:database}
# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.check-location=false
spring.flyway.default-schema=${POSTGRES_SCHEMA:auth}
spring.flyway.schemas=${POSTGRES_SCHEMA:auth}
# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Admin
admin.name=${NAME_ADMIN:admin}
admin.email=${EMAIL_ADMIN:admin@auth.com}
admin.password=${PASSWORD_ADMIN:admin123}
# Exception Handling
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
# SpringDoc / Swagger
springdoc.show-hateoas-endpoints=false
security.jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
